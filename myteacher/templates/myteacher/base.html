<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white shadow-sm p-4 mb-5">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-xl font-bold text-slate-900">MyTeacher Portal</span>
                <span class="text-sm text-slate-500">School Management</span>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <span id="headerClock" class="px-4 py-2 rounded-full bg-slate-100 text-slate-700 text-sm font-semibold">Loading time...</span>
                <a href="{% url 'myteacher:dashboard' %}" class="px-4 py-2 rounded-full bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition">Dashboard</a>
                <a href="{% url 'myteacher:view_routine' %}" class="px-4 py-2 rounded-full bg-slate-100 text-slate-800 text-sm font-semibold hover:bg-slate-200 transition">View Routine</a>
                <a href="{% url 'myteacher:manage_routine' %}" class="px-4 py-2 rounded-full bg-slate-100 text-slate-800 text-sm font-semibold hover:bg-slate-200 transition">Manage Routine</a>
                <a href="{% url 'myteacher:student_corner' %}" class="px-4 py-2 rounded-full bg-slate-100 text-slate-800 text-sm font-semibold hover:bg-slate-200 transition">Student Corner</a>
                <a href="{% url 'myteacher:id_cards' %}" class="px-4 py-2 rounded-full bg-slate-100 text-slate-800 text-sm font-semibold hover:bg-slate-200 transition">ID Cards</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script>
        function updateHeaderClock() {
            const clock = document.getElementById('headerClock');
            if (!clock) return;
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const period = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            const displayHours = String(hours).padStart(2, '0');
            clock.textContent = `${displayHours}:${minutes}:${seconds} ${period}`;
        }
        updateHeaderClock();
        setInterval(updateHeaderClock, 1000);
    </script>
</body>
</html>
