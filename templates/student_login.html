<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Khondoker Naser Uddin High School</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        /* লোগোর ডিজাইন */
        .logo-img {
            max-width: 80px;
            height: auto;
            margin-bottom: 10px;
        }
        .school-name {
            color: #23a6d5;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0;
        }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 2px solid #e2e8f0; }
        .password-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #a0aec0; font-size: 1.25rem;
        }
        .btn-login {
            background: linear-gradient(135deg, #e73c7e, #23a6d5);
            border: none; border-radius: 10px; padding: 12px; font-weight: 600; color: white;
            transition: 0.3s;
        }
        .btn-login:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">
            <div class="card shadow-lg p-4">
                <div class="card-body">
                    <!-- লোগো এবং স্কুলের নাম হেডার -->
                    <div class="text-center mb-4">
                        <img src="{% static 'images/logo.png' %}" alt="School Logo" class="logo-img">
                        <h4 class="school-name">Khondoker Naser Uddin High School</h4>
                        <p class="text-muted small">Student Portal Login</p>
                    </div>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show shadow-sm" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="fw-semibold">Student ID</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter your ID" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="fw-semibold">Password</label>
                            <div class="password-wrapper">
                                <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter password" required>
                                <i class="bi bi-eye toggle-password" id="togglePassword"></i>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-login w-100 shadow">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#id_password');
    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>

</body>
</html>
