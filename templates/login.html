<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MyTeacher Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <style>
        body { 
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            padding: 20px;
            font-family: 'Times New Roman', Times, serif; /* পুরো পেজে Times New Roman */
        }
        
        .login-card { 
            border-radius: 20px; 
            border: none; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            overflow: hidden; 
            width: 100%;
            max-width: 400px; 
            margin: auto;
        }

        .login-header { 
            background: #2c3e50; 
            color: white; 
            padding: 2rem 1rem; 
            text-align: center; 
        }

        /* লোগো স্টাইল */
        .school-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* স্টাইলিশ টাইটেল */
        .portal-title {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        input[type="text"], input[type="password"] {
            display: block;
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            border: 1px solid #ced4da;
            border-radius: 12px;
            transition: 0.3s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            outline: none;
        }

        .btn-primary { background: #3498db; border: none; padding: 0.8rem; font-weight: bold; border-radius: 12px; }
        .btn-primary:hover { background: #2980b9; }

        .password-container { position: relative; }
        .toggle-password { 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            cursor: pointer; 
            color: #6c757d; 
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
            <div class="card login-card">
                <div class="login-header">
                    <img src="{% static 'images/logo.png' %}" alt="School Logo" class="school-logo">
                    
                    <h4 class="mb-0">Khondoker Naser Uddin High School</h4>
                    
                    <div class="portal-title">Teacher Login Portal</div>
                </div>
                <div class="card-body p-4">
                    
                    {% if form.non_field_errors %}
                        {% for error in form.non_field_errors %}
                            <div class="alert alert-danger text-center small mb-3">
                                <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-muted">Username</label>
                            {{ form.username }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Password</label>
                            <div class="password-container">
                                {{ form.password }}
                                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('input[name="password"]');

    togglePassword.addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
